<svg viewBox="0 46 720 684" xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-loop" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="720" height="730" fill="white"/>

  <!-- ═══════ STEP 1: DATASET POOL  y=56–120 ═══════ -->
  <rect x="20"  y="56" width="425" height="64" rx="6" fill="#EEF2F5" stroke="#4A6080" stroke-width="2"/>
  <text x="232" y="82"  text-anchor="middle" font-size="14" font-weight="bold" fill="#2C4260">25 evaluation-eligible domains</text>
  <text x="232" y="102" text-anchor="middle" font-size="11"              fill="#2C4260">Each takes one turn as the held-out test set</text>

  <rect x="455" y="56" width="245" height="64" rx="6" fill="#F5F0E4" stroke="#8B7230" stroke-width="2"/>
  <text x="577" y="78"  text-anchor="middle" font-size="13" font-weight="bold" fill="#5C4A1A">2 training-only domains</text>
  <text x="577" y="95"  text-anchor="middle" font-size="11"              fill="#5C4A1A">POPS  ·  Real-Life Trial</text>
  <text x="577" y="111" text-anchor="middle" font-size="10"              fill="#5C4A1A">Always in training — never held out</text>

  <!-- Label above arrow, then arrow — clear of both sections -->
  <text x="360" y="138" text-anchor="middle" font-size="11" font-style="italic" fill="#374151">For each of the 25 evaluation-eligible domains:</text>
  <line x1="360" y1="143" x2="360" y2="157" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════ STEP 2: ONE FOLD  y=161–316 ═══════ -->
  <rect x="20"  y="161" width="680" height="155" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="20"  y="161" width="680" height="27"  rx="6" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="360" y="180" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#111827">One fold  (example: "li et al 2015 hotel" held out)</text>

  <!-- Training block -->
  <rect x="33"  y="196" width="430" height="108" rx="5" fill="#EEF2F5" stroke="#4A6080" stroke-width="2"/>
  <text x="248" y="232" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C4260">Training set</text>
  <text x="248" y="255" text-anchor="middle" font-size="12"              fill="#2C4260">24 eval-eligible  +  2 training-only</text>
  <text x="248" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A6080">=  26 domains</text>

  <!-- Test block -->
  <rect x="478" y="196" width="207" height="108" rx="5" fill="#FBEFEC" stroke="#C04A2A" stroke-width="2.5"/>
  <text x="581" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#7A2A14">Test set</text>
  <text x="581" y="255" text-anchor="middle" font-size="12"              fill="#7A2A14">li et al 2015 hotel</text>
  <text x="581" y="276" text-anchor="middle" font-size="10.5"            fill="#C04A2A">1 held-out domain</text>

  <!-- Label above arrow -->
  <text x="360" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#374151">Three representations fitted independently on the same split:</text>
  <line x1="360" y1="339" x2="360" y2="353" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════ STEP 3: PIPELINES  y=357–437 ═══════ -->
  <rect x="20"  y="357" width="210" height="78" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="125" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">TF-IDF</text>
  <text x="125" y="400" text-anchor="middle" font-size="11"              fill="#374151">+ Logistic Regression</text>
  <text x="125" y="416" text-anchor="middle" font-size="9.5"             fill="#9CA3AF">bag-of-words</text>

  <rect x="255" y="357" width="210" height="78" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="360" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">FastText</text>
  <text x="360" y="400" text-anchor="middle" font-size="11"              fill="#374151">+ Logistic Regression</text>
  <text x="360" y="416" text-anchor="middle" font-size="9.5"             fill="#9CA3AF">static word embeddings</text>

  <rect x="490" y="357" width="210" height="78" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="595" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">SBERT</text>
  <text x="595" y="400" text-anchor="middle" font-size="11"              fill="#374151">+ Logistic Regression</text>
  <text x="595" y="416" text-anchor="middle" font-size="9.5"             fill="#9CA3AF">contextual sentence embeddings</text>

  <!-- Arrows pipelines → outputs: clear gap -->
  <line x1="125" y1="437" x2="125" y2="455" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="437" x2="360" y2="455" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="595" y1="437" x2="595" y2="455" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════ STEP 4: OUTPUTS  y=457–493 ═══════ -->
  <rect x="48"  y="457" width="154" height="36" rx="4" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="125" y="480" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#374151">AUC  ·  macro-F1</text>

  <rect x="283" y="457" width="154" height="36" rx="4" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="360" y="480" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#374151">AUC  ·  macro-F1</text>

  <rect x="518" y="457" width="154" height="36" rx="4" fill="white" stroke="#6B7280" stroke-width="1.5"/>
  <text x="595" y="480" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#374151">AUC  ·  macro-F1</text>

  <!-- ═══════ LOOP ANNOTATION — right side, within canvas ═══════ -->
  <!-- Arc from outputs (y=493) back up to fold section (y=185), staying within x=700–715 -->
  <path d="M 700 493 C 718 440, 718 240, 700 185"
        stroke="#9CA3AF" stroke-width="1.5" fill="none"
        stroke-dasharray="6,4" marker-end="url(#arr-loop)"/>
  <!-- Rotated label sitting along the arc, fully within canvas -->
  <text x="713" y="345" text-anchor="middle" font-size="9.5" fill="#9CA3AF"
        transform="rotate(90, 713, 345)">Repeat for all 25 domains  (25 folds total)</text>

  <!-- Label above arrow, then arrow -->
  <text x="330" y="511" text-anchor="middle" font-size="11" font-style="italic" fill="#374151">After all 25 folds:</text>
  <line x1="360" y1="516" x2="360" y2="530" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════ STEP 5: RESULTS  y=534–628 ═══════ -->
  <rect x="100" y="534" width="520" height="92" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="360" y="560" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Results matrix:  25 × 3</text>
  <text x="360" y="582" text-anchor="middle" font-size="12"              fill="#374151">25 folds  ×  3 representations</text>
  <text x="360" y="602" text-anchor="middle" font-size="12"              fill="#374151">=  75 AUC scores  +  75 macro-F1 scores</text>

  <!-- ═══════ LEGEND ═══════ -->
  <rect x="40"  y="648" width="13" height="13" rx="2" fill="#EEF2F5" stroke="#4A6080" stroke-width="1.5"/>
  <text x="59"  y="659" font-size="11" fill="#374151">Evaluation-eligible training data</text>

  <rect x="255" y="648" width="13" height="13" rx="2" fill="#FBEFEC" stroke="#C04A2A" stroke-width="1.5"/>
  <text x="274" y="659" font-size="11" fill="#374151">Held-out test domain</text>

  <rect x="440" y="648" width="13" height="13" rx="2" fill="#F5F0E4" stroke="#8B7230" stroke-width="1.5"/>
  <text x="459" y="659" font-size="11" fill="#374151">Fixed training-only (never tested)</text>

</svg>
